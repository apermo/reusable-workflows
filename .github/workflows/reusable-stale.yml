name: Reusable Stale

on:
    workflow_call:
        inputs:
            days-before-stale:
                description: 'Days before marking as stale'
                required: false
                type: number
                default: 30
            days-before-close:
                description: 'Days before closing stale items'
                required: false
                type: number
                default: 14
            exempt-labels:
                description: 'Comma-separated exempt labels'
                required: false
                type: string
                default: 'pinned,security,in-progress'

jobs:
    stale:
        name: Close Stale Issues and PRs
        runs-on: ubuntu-latest
        permissions:
            issues: write
            pull-requests: write
        steps:
            - uses: actions/stale@v9
              with:
                  days-before-stale: ${{ inputs.days-before-stale }}
                  days-before-close: ${{ inputs.days-before-close }}
                  stale-issue-label: stale
                  stale-pr-label: stale
                  exempt-issue-labels: ${{ inputs.exempt-labels }}
                  exempt-pr-labels: ${{ inputs.exempt-labels }}

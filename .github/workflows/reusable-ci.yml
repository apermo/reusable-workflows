name: Reusable CI

on:
    workflow_call:
        inputs:
            php-versions:
                description: 'JSON array of PHP versions to test'
                required: false
                type: string
                default: '["8.3", "8.4"]'
            php-version-coverage:
                description: 'PHP version to collect coverage on'
                required: false
                type: string
                default: '8.4'
            run-phpstan:
                description: 'Run PHPStan analysis'
                required: false
                type: boolean
                default: true
            run-phpcs:
                description: 'Run PHPCS coding standards check'
                required: false
                type: boolean
                default: true
            test-command:
                description: 'Composer script to run for tests'
                required: false
                type: string
                default: 'test'
            codecov-upload:
                description: 'Upload coverage to Codecov'
                required: false
                type: boolean
                default: false
        secrets:
            codecov-token:
                description: 'Codecov upload token'
                required: false

permissions:
    contents: read

jobs:
    test:
        name: Tests (PHP ${{ matrix.php }})
        runs-on: ubuntu-latest
        strategy:
            matrix:
                php: ${{ fromJson(inputs.php-versions) }}
        steps:
            - uses: actions/checkout@v4

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  coverage: ${{ matrix.php == inputs.php-version-coverage && 'pcov' || 'none' }}

            - uses: actions/cache@v4
              with:
                  path: vendor
                  key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
                  restore-keys: composer-${{ matrix.php }}-

            - run: composer install --no-interaction --prefer-dist

            - run: composer ${{ inputs.test-command }}
              if: matrix.php != inputs.php-version-coverage

            - run: composer ${{ inputs.test-command }} -- --coverage-clover=coverage.xml
              if: matrix.php == inputs.php-version-coverage

            - uses: codecov/codecov-action@v5
              if: matrix.php == inputs.php-version-coverage && inputs.codecov-upload
              with:
                  files: coverage.xml
                  token: ${{ secrets.codecov-token }}

    analyse:
        name: PHPStan
        if: inputs.run-phpstan
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ inputs.php-version-coverage }}
                  coverage: none

            - uses: actions/cache@v4
              with:
                  path: vendor
                  key: composer-${{ inputs.php-version-coverage }}-${{ hashFiles('composer.lock') }}
                  restore-keys: composer-${{ inputs.php-version-coverage }}-

            - run: composer install --no-interaction --prefer-dist
            - run: composer analyse

    cs:
        name: Coding Standards
        if: inputs.run-phpcs
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ inputs.php-version-coverage }}
                  coverage: none

            - uses: actions/cache@v4
              with:
                  path: vendor
                  key: composer-${{ inputs.php-version-coverage }}-${{ hashFiles('composer.lock') }}
                  restore-keys: composer-${{ inputs.php-version-coverage }}-

            - run: composer install --no-interaction --prefer-dist
            - run: composer cs

    ci-summary:
        name: CI
        needs: [test, analyse, cs]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Check job results
              run: |
                  if [ "${{ needs.test.result }}" != "success" ]; then
                      echo "::error::Tests did not succeed (result: ${{ needs.test.result }})"
                      exit 1
                  fi
                  if [ "${{ needs.analyse.result }}" != "success" ] && [ "${{ needs.analyse.result }}" != "skipped" ]; then
                      echo "::error::PHPStan did not succeed (result: ${{ needs.analyse.result }})"
                      exit 1
                  fi
                  if [ "${{ needs.cs.result }}" != "success" ] && [ "${{ needs.cs.result }}" != "skipped" ]; then
                      echo "::error::PHPCS did not succeed (result: ${{ needs.cs.result }})"
                      exit 1
                  fi

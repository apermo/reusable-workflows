name: Reusable Release

on:
    workflow_call:
        inputs:
            changelog-path:
                description: 'Path to CHANGELOG.md'
                required: false
                type: string
                default: 'CHANGELOG.md'

jobs:
    release:
        name: Create Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Extract version from CHANGELOG
              id: version
              run: |
                  VERSION=$(grep -m1 -oP '(?<=## \[)\d+\.\d+\.\d+[^]]*' ${{ inputs.changelog-path }} || echo "")

                  if [ -z "$VERSION" ]; then
                      echo "skip=true" >> "$GITHUB_OUTPUT"
                      echo "No version found, skipping release."
                      exit 0
                  fi

                  TAG="v$VERSION"

                  if git tag -l "$TAG" | grep -q "$TAG"; then
                      echo "skip=true" >> "$GITHUB_OUTPUT"
                      echo "Tag $TAG already exists, skipping."
                      exit 0
                  fi

                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                  echo "skip=false" >> "$GITHUB_OUTPUT"

                  if [[ "$VERSION" == *"-"* ]]; then
                      echo "prerelease=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "prerelease=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Delete old prerelease artifacts on final release
              if: steps.version.outputs.skip == 'false' && steps.version.outputs.prerelease == 'false'
              run: |
                  BASE_VERSION=$(echo "${{ steps.version.outputs.version }}" | grep -oP '^\d+\.\d+\.\d+')
                  for tag in $(git tag -l "v${BASE_VERSION}-*"); do
                      echo "Deleting prerelease tag: $tag"
                      gh release delete "$tag" --yes --cleanup-tag || true
                  done
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Create release
              if: steps.version.outputs.skip == 'false'
              run: |
                  PRERELEASE_FLAG=""
                  if [ "${{ steps.version.outputs.prerelease }}" = "true" ]; then
                      PRERELEASE_FLAG="--prerelease"
                  fi

                  gh release create "${{ steps.version.outputs.tag }}" \
                      --title "${{ steps.version.outputs.tag }}" \
                      --generate-notes \
                      $PRERELEASE_FLAG
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Comment on merged PR
              if: steps.version.outputs.skip == 'false'
              uses: actions/github-script@v7
              with:
                  script: |
                      const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          commit_sha: context.sha,
                      });

                      for (const pr of prs) {
                          await github.rest.issues.createComment({
                              issue_number: pr.number,
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              body: `Released as [${{ steps.version.outputs.tag }}](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${{ steps.version.outputs.tag }})`
                          });
                      }
